services:
  - type: web
    name: tara-finserv-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@tarafinserv.com
      - key: ADMIN_PASSWORD
        value: Tara@Admin2026
      - key: CORS_ORIGINS
        value: https://tarafinserv.com,https://www.tarafinserv.com
      # MYSQL_HOST / MYSQL_PORT / MYSQL_USER / MYSQL_PASSWORD / MYSQL_DB
      # → add manually in Render dashboard (Environment tab) after creating the service.
